<script>
    const RENDER_URL = "https://secret-vault-jt8z.onrender.com";

    function checkPassword() {
        const password = document.getElementById('passwordInput').value;
        if (password === "alpha") {
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('galleryBox').style.display = 'grid';
            loadPhotos();
        } else {
            alert("كلمة السر خاطئة!");
        }
    }

    async function loadPhotos() {
        try {
            const response = await fetch(`${RENDER_URL}/api/photos`);
            const photos = await response.json();
            const gallery = document.getElementById('galleryBox');
            gallery.innerHTML = "";
            photos.forEach(p => {
                const img = document.createElement('img');
                img.src = p.url;
                gallery.appendChild(img);
            });
        } catch (e) {
            alert("فشل الاتصال بالسيرفر، تأكد من أن السيرفر يعمل");
        }
    }
</script>
