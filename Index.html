<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الخزنة السرية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #1c1c1e; 
            color: white; 
            text-align: center; 
            padding: 20px; 
        }
        .password-container { 
            margin-top: 50px; 
        }
        input { 
            padding: 12px; 
            border-radius: 8px; 
            border: none; 
            font-size: 16px; 
            margin-bottom: 15px; 
            width: 80%; 
            max-width: 300px; 
            text-align: center;
        }
        button { 
            padding: 12px 24px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
        }
        .gallery { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            margin-top: 20px; 
            display: none; 
        }
        .gallery img { 
            width: 100%; 
            height: 100px; 
            object-fit: cover; 
            border-radius: 8px; 
        }
    </style>
</head>
<body>

    <div id="lockScreen" class="password-container">
        <h2>🔒 هذه الخزنة محمية</h2>
        <p>أدخل كلمة السر المشتركة لرؤية الصور:</p>
        <input type="password" id="passwordInput" placeholder="أدخل كلمة السر هنا...">
        <br>
        <button onclick="checkPassword()">دخول المعرض</button>
    </div>

    <div id="galleryScreen" class="gallery">
        </div>

    <script>
        // تفعيل واجهة تلجرام وتوسيع الشاشة لتبدو كتطبيق كامل
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        // 📝 يمكنك تغيير كلمة السر هذه إلى أي كلمة تريدها أنت وأصدقاؤك
        const SECRET_PASSWORD = "Friends2026"; 

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === SECRET_PASSWORD) {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('galleryScreen').style.display = 'grid';
                loadPhotos();
            } else {
                alert('⚠️ كلمة السر خاطئة! حاول مجدداً.');
            }
        }

        function loadPhotos() {
            console.log("جاري جلب الصور من قاعدة البيانات...");
            // هنا سيتم ربط جلب الصور لاحقاً بعد إعداد Firebase
        }
    </script>
</body>
</html>
